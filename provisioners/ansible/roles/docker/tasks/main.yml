- name: Install Docker
  package:
    name: docker
    state: latest
  vars:
    ansible_python_interpreter: "/usr/bin/python"
  become: yes

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Ensure the docker group is created
  group:
    name: docker
    state: present

- name: Add user vagrant to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: yes

- name: Install Python3
  yum:
    name: python3
    state: latest
  vars:
    ansible_python_interpreter: "/usr/bin/python"


#- name: Install pip - the docker module needs pip 2.7 python (do NOT ASK WHY)
