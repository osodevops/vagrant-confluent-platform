---
- name: Install yum utils
  yum:
    name: yum-utils
    state: latest
  vars:
    ansible_python_interpreter: "/usr/bin/python"
  become: yes

- name: Install device-mapper-persistent-data
  yum:
    name: device-mapper-persistent-data
    state: latest
  vars:
    ansible_python_interpreter: "/usr/bin/python"
  become: yes

- name: Install lvm2
  yum:
    name: lvm2
    state: latest
  vars:
    ansible_python_interpreter: "/usr/bin/python"
  become: yes

